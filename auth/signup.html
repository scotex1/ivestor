<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — FinVest Pro</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<div class="hero-orb hero-orb-1" style="opacity:0.5;"></div>
<div class="hero-orb hero-orb-2" style="opacity:0.5;"></div>

<div class="auth-page">
  <div class="auth-card fade-in">

    <a href="../index.html" class="auth-logo">
      <div style="font-size:2rem;margin-bottom:4px;">📈</div>
      FinVest Pro
    </a>

    <h2 style="text-align:center;font-size:1.4rem;margin-bottom:6px;">Create your account</h2>
    <p style="text-align:center;color:var(--text-secondary);font-size:0.88rem;margin-bottom:32px;">Free forever. No credit card required.</p>

    <!-- Google Sign Up -->
    <button id="google-signin-btn" class="btn btn-ghost btn-full" style="margin-bottom:20px;border-color:var(--border-hover);padding:12px;">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Sign up with Google
    </button>

    <div class="divider-text">or sign up with email</div>
    <div style="margin-bottom:24px;"></div>

    <form id="signup-form" style="display:flex;flex-direction:column;gap:18px;">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" id="name" class="form-input" placeholder="Your full name" required autocomplete="name">
      </div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Min. 6 characters" required autocomplete="new-password">
        <span class="form-hint">Use at least 6 characters</span>
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" id="confirm-password" class="form-input" placeholder="Repeat your password" required autocomplete="new-password">
      </div>

      <div style="display:flex;gap:10px;align-items:flex-start;padding:14px;background:var(--bg-secondary);border-radius:var(--radius-sm);border:1px solid var(--border);">
        <input type="checkbox" id="terms-check" required style="margin-top:3px;accent-color:var(--gold);width:16px;height:16px;flex-shrink:0;">
        <label for="terms-check" style="font-size:0.82rem;color:var(--text-secondary);line-height:1.5;cursor:pointer;">
          I agree to FinVest Pro's
          <a href="../legal/terms.html" style="color:var(--gold);" target="_blank">Terms of Service</a> and
          <a href="../legal/privacy-policy.html" style="color:var(--gold);" target="_blank">Privacy Policy</a>
        </label>
      </div>

      <button type="submit" id="signup-btn" class="btn btn-primary btn-full btn-lg">
        Create Free Account
      </button>
    </form>

    <div style="text-align:center;margin-top:24px;font-size:0.88rem;color:var(--text-secondary);">
      Already have an account?
      <a href="login.html" style="color:var(--gold);text-decoration:none;font-weight:600;">Sign in</a>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="../assets/js/api.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="../assets/js/auth.js"></script>
</body>
</html>
